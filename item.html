<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="item.css">
    <title>Document</title>
</head>
<body>
    <!-- 
    - header:
        - hd-home
            - info
            - mainbar
        - navigation
    - main:
        - info
            - img
            - detail
                - title
                - price
        - describe
        - evaluate
        - topic-same
    - footer
        - ft-content
        - ft-copyright
    -->

    
    <header class="header">

    </header>



<main class="main">

    <!-- INFO PRODUCT -->
    <section class="info">

        <!-- IMG -->
        <div class="img">
            <div class="thumbs"></div>
            <img class="main-img">
        </div>

        <!-- DETAIL -->
        <div class="detail">

            <h1 class="title"></h1>

            <div class="price">
                <span class="new"></span>
                <span class="old" class="oldPrice"></span>
            </div>

            <ul class="meta">
                <li>Tác giả: <span class="author"></span></li>
                <li>Độ tuổi: <span class="age"></span></li>
                <li>Kích thước: <span class="size"></span></li>
                <li>Số trang: <span class="pages"></span></li>
                <li>Loại bìa: <span class="type"></span></li>
            </ul>

            <div class="quantity">
                <button class="minus">-</button>
                <input  class="qty" value="1">
                <button class="plus">+</button>
            </div>

            <button class="btn add">Thêm vào giỏ hàng</button>
            <button class="btn buy">Mua ngay</button>

        </div>
    </section>

    <!-- DESCRIPTION -->
    <section class="describe">
        <h2>Mô tả sản phẩm</h2>
        <p class="desc"></p>
    </section>

    <!-- EVALUATE -->
    <section class="evaluate">
        <h2>Đánh giá</h2>
        <div class="rating"></div>
    </section>

    <!-- SAME TOPIC -->
    <section class="topic-same">
        <h2>Sách cùng thể loại</h2>
        <div class="related"></div>
    </section>

</main>

<!-- FOOTER -->
<footer class="footer"></footer>

<!-- FLOAT BUTTON -->
<div class="fixed">
    <i class="fa-solid fa-cart-shopping"></i>
</div>

<!-- JS -->
<script src="data/js/database.js"></script>
<script src="data/js/item.js"></script>

  

</body>
</html>
